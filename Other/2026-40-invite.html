<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="referrer" content="no-referrer" />
<title>You're Invited</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  /* -------------------------------------------------------------
     CONFIG — edit the data in the <script id="config"> block below
     ------------------------------------------------------------- */

  :root {
    --envelope-bg: #c9a34a;        /* envelope body — warm gold */
    --envelope-shadow: #7a5a17;    /* crease / shadow tone — deep gold */
    --flap: #dcb75c;               /* back flap (lighter champagne gold) */
    --wax: #6e1a1f;                /* wax seal — oxblood red on gold */
    --wax-dark: #3a0a0d;
    --card-bg: #faf6ee;            /* card paper — warm cream */
    --card-edge: #e6dcc5;
    --ink: #1a1a1f;
    --accent: #b8892b;             /* gold accent */
    --accent-dark: #7a5a17;
    --muted: #7a6f5c;
    --stage: radial-gradient(1400px 900px at 50% 20%, #2a2a32 0%, #17171c 55%, #0a0a0d 100%);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { overflow-x: hidden; }
  body {
    margin: 0;
    width: 100%;
    font-family: 'Lato', system-ui, sans-serif;
    font-weight: 400;
    color: var(--ink);
    background: #0a0a0d;
    background-image: var(--stage);
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- STAGE ---------- */
  .stage {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 28vh 24px 24px;
    perspective: 1800px;
  }

  /* ---------- ENVELOPE ---------- */
  .scene {
    position: relative;
    width: 100%;
    max-width: 560px;
    margin-inline: auto;
    aspect-ratio: 3 / 2;
    transition: transform 900ms cubic-bezier(.2,.7,.2,1);
  }
  @media (max-width: 540px) {
    .card { padding: 30px 20px 24px; }
  }
  .scene.opened { transform: translateY(-2vh) scale(1.02); }

  .envelope {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,.35),
      0 10px 20px -10px rgba(0,0,0,.25);
  }
  .flap-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* back of the envelope (where the card sits) */
  .envelope .back {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, var(--flap) 0%, var(--envelope-bg) 55%, var(--envelope-shadow) 100%);
    border-radius: 10px;
    overflow: hidden;
  }
  .envelope .back::after {
    /* subtle paper grain */
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 2px;
    pointer-events: none;
  }

  /* front pocket (the lower triangle that holds the card in) */
  .envelope .pocket {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: var(--envelope-bg);
    clip-path: polygon(0 45%, 50% 100%, 100% 45%, 100% 100%, 0 100%);
    box-shadow: inset 0 6px 10px rgba(0,0,0,.35);
    z-index: 5;
  }
  .envelope .pocket::before {
    /* center crease */
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 42%, rgba(0,0,0,.5) 50%, transparent 58%);
    clip-path: polygon(0 45%, 50% 100%, 100% 45%);
  }
  .envelope .side-left,
  .envelope .side-right {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--envelope-bg), var(--envelope-shadow));
    z-index: 3;
  }
  .envelope .side-left,
  .envelope .side-right { z-index: 4; }
  .envelope .side-left  { clip-path: polygon(0 0, 50% 50%, 0 100%); }
  .envelope .side-right { clip-path: polygon(100% 0, 50% 50%, 100% 100%); }

  /* flap on top that opens */
  .flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(180deg, var(--flap) 0%, var(--envelope-bg) 100%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 700ms cubic-bezier(.6,.02,.3,1);
    z-index: 6;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    box-shadow: 0 1px 0 rgba(0,0,0,.05) inset;
  }
  .flap::after {
    /* inside shading visible when open */
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,0) 70%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .scene.opened .flap { transform: rotateX(180deg); z-index: 2; }

  /* wax seal */
  .seal {
    position: absolute;
    left: 50%; top: 55%;
    width: 92px; height: 92px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #b83740 0%, var(--wax) 45%, var(--wax-dark) 100%);
    box-shadow:
      0 6px 14px rgba(0,0,0,.5),
      inset 0 -6px 12px rgba(0,0,0,.35),
      inset 0 4px 10px rgba(255,220,150,.35);
    display: grid; place-items: center;
    z-index: 7;
    transition: opacity 300ms ease, transform 500ms ease;
    user-select: none;
  }
  .seal .monogram {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    color: #fff5dc;
    font-size: 48px;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
    display: block;
  }
  .seal::before {
    content: "";
    position: absolute; inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(255, 240, 200, .4);
  }
  .seal::after {
    content: "";
    position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1px dashed rgba(255, 240, 200, .25);
  }
  .scene.opened .seal { opacity: 0; transform: translate(-50%, -50%) scale(.6); }

  /* ---------- CARD ---------- */
  .card {
    position: absolute;
    left: 6%; right: 6%;
    top: 2%;
    height: 115%;
    background: var(--card-bg);
    border-radius: 6px;
    box-shadow:
      0 1px 0 rgba(0,0,0,.04),
      0 20px 40px -15px rgba(0,0,0,.5);
    border: 1px solid var(--card-edge);
    opacity: 0;
    transform: translate3d(0, 18%, 0) scale(.96);
    transition:
      opacity 400ms ease 750ms,
      transform 800ms cubic-bezier(.2,.7,.2,1) 750ms;
    z-index: 2;
    padding: 40px 30px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
    overflow: hidden;
  }
  .scene.opened .card {
    opacity: 1;
    transform: translate3d(0, -58%, 0) scale(1);
    z-index: 10;
  }
  .card::before {
    /* decorative gold border */
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(184, 137, 43, .45);
    border-radius: 3px;
    pointer-events: none;
  }
  .card::after {
    /* inner hairline */
    content: "";
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(184, 137, 43, .2);
    border-radius: 2px;
    pointer-events: none;
  }
  .card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(40px, 7vw, 60px);
    line-height: 1;
    margin: 8px 0 14px;
    color: var(--ink);
    letter-spacing: .005em;
  }
  .card .forty {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(16px, 2.4vw, 20px);
    line-height: 1;
    margin: 0 0 10px;
    letter-spacing: .5em;
    text-transform: uppercase;
    color: var(--accent);
    /* tiny hairlines flanking the word */
    padding: 6px 14px 6px 20px;
    border-top: 1px solid rgba(184,137,43,.4);
    border-bottom: 1px solid rgba(184,137,43,.4);
    display: inline-block;
  }
  .card .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(15px, 2vw, 18px);
    letter-spacing: .01em;
    color: var(--muted);
    margin: 10px 0 2px;
  }
  .card .divider-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 14px 0 10px;
    width: 60%;
    max-width: 240px;
  }
  .card .divider-ornament .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,137,43,.55), transparent);
  }
  .card .divider-ornament .diamond {
    font-size: 8px;
    color: var(--accent);
    opacity: .7;
    line-height: 1;
  }
  .card .detail {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(15px, 2vw, 18px);
    letter-spacing: .03em;
    margin: 3px 0;
    color: var(--ink);
  }
  .card .detail strong {
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    font-size: 9px;
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
  }

  /* ---------- CTA / HINT ---------- */
  .hint {
    position: absolute;
    bottom: -48px; left: 0; right: 0;
    text-align: center;
    color: #c9b98f;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .4em;
    text-transform: uppercase;
    transition: opacity 400ms ease;
    opacity: .75;
  }
  .scene.opened .hint { opacity: 0; pointer-events: none; }
  .tap-target {
    position: absolute; inset: 0;
    z-index: 10;
    cursor: pointer;
    background: transparent;
    border: 0;
  }
  .scene.opened .tap-target { pointer-events: none; }

  /* ---------- PANEL (details + rsvp) ---------- */
  .panel {
    max-width: 520px;
    width: calc(100% - 32px);
    margin: 40px auto 60px;
    background: var(--card-bg);
    border: 1px solid var(--card-edge);
    border-radius: 10px;
    padding: 32px 32px 28px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,.5),
      0 0 0 1px rgba(184,137,43,.15);
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 600ms ease 900ms, transform 600ms ease 900ms;
  }
  @media (max-width: 540px) {
    .panel { padding: 24px 20px; }
  }
  .panel.visible { opacity: 1; transform: translateY(0); }
  .panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 24px;
    letter-spacing: .01em;
    text-transform: none;
    color: var(--ink);
    margin: 0 0 20px;
    text-align: center;
  }
  .panel p.lede {
    text-align: center;
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 15px;
    margin: 0 0 24px;
  }
  .panel .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .panel .grid .cell {
    background: #fff;
    border: 1px solid var(--card-edge);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .panel .grid .label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .panel .grid .value {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: var(--ink);
  }
  @media (max-width: 480px) {
    .panel .grid { grid-template-columns: 1fr; }
  }

  /* ---------- REPLY NOTE ---------- */
  .reply-note {
    text-align: center;
    padding: 8px 0 4px;
  }
  .reply-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 auto 20px;
    width: 60%;
    max-width: 220px;
  }
  .reply-ornament .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,137,43,.55), transparent);
  }
  .reply-ornament .diamond {
    font-size: 8px;
    color: var(--accent);
    opacity: .7;
    line-height: 1;
  }
  .reply-lede {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .reply-call {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    margin: 0;
    letter-spacing: .01em;
  }

  /* ---------- RSVP FORM ---------- */
  .rsvp {
    margin-top: 18px;
    display: grid;
    gap: 14px;
  }
  .rsvp label {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .rsvp label .req {
    color: var(--wax);
    margin-left: 4px;
    letter-spacing: 0;
  }
  .rsvp .hint-line {
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    margin-top: -4px;
  }
  .rsvp input[type="text"],
  .rsvp input[type="number"],
  .rsvp textarea {
    width: 100%;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--card-edge);
    border-radius: 6px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 180ms ease, box-shadow 180ms ease;
  }
  .rsvp input:focus,
  .rsvp textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,137,43,.15);
  }
  .rsvp textarea { min-height: 72px; resize: vertical; }
  .rsvp .attending-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .rsvp .attend-btn {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--card-edge);
    border-radius: 6px;
    padding: 12px;
    cursor: pointer;
    transition: all 180ms ease;
  }
  .rsvp .attend-btn:hover { border-color: var(--accent); }
  .rsvp .attend-btn.selected {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .rsvp .guest-row { display: none; }
  .rsvp.is-attending .guest-row { display: block; }
  .rsvp .submit {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: .02em;
    background: var(--wax);
    color: #fff5dc;
    border: 0;
    border-radius: 6px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 180ms ease, transform 120ms ease;
    margin-top: 4px;
  }
  .rsvp .submit:hover { background: var(--wax-dark); }
  .rsvp .submit:active { transform: translateY(1px); }
  .rsvp .submit:disabled { opacity: .5; cursor: not-allowed; }
  .rsvp .error {
    color: var(--wax);
    font-size: 13px;
    text-align: center;
    min-height: 18px;
  }
  .rsvp-success {
    text-align: center;
    padding: 20px 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    display: none;
  }
  .rsvp-success.visible { display: block; }

  /* ---------- FOOTER ---------- */
  .site-footer {
    text-align: center;
    padding: 24px 20px 40px;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #8a7f65;
  }
  .site-footer .heart {
    color: var(--accent);
    font-style: normal;
    margin: 0 4px;
    display: inline-block;
    transform: translateY(1px);
  }
  .site-footer .by {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    text-transform: none;
    letter-spacing: .02em;
    font-size: 15px;
    color: var(--accent);
  }

  /* ---------- AMBIENT DETAILS ---------- */
  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 50;
  }
  .confetti span {
    position: absolute;
    top: -20px;
    width: 8px; height: 12px;
    opacity: 0;
    animation: fall 3.4s cubic-bezier(.2,.6,.3,1) forwards;
  }
  @keyframes fall {
    0%   { opacity: 0; transform: translateY(-10vh) rotate(0); }
    10%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .scene, .flap, .card, .panel { transition-duration: 1ms !important; }
    .confetti { display: none; }
  }

  /* Small-screen / low-end-device perf tweaks */
  @media (max-width: 480px) {
    .envelope {
      /* lighter, single shadow renders faster than stacked shadows */
      box-shadow: 0 12px 28px -10px rgba(0,0,0,.45);
    }
    .panel {
      box-shadow: 0 12px 28px -10px rgba(0,0,0,.4), 0 0 0 1px rgba(184,137,43,.12);
    }
    .envelope .back::after {
      /* drop the paper-grain dot pattern on small screens */
      display: none;
    }
    .stage {
      padding: 16px;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
  }

</style>
</head>
<body>

<script id="config" type="application/json">
{
  "name": "Shah",
  "milestoneWord": "forty",
  "cardTitle": "Shah's 40th birthday",
  "occasion": "Shah's Fortieth Birthday",
  "subtitle": "Four decades of one extraordinary guy.",
  "date": "Saturday, June 6th",
  "time": "1:00 PM",
  "locationLabel": "Location",
  "location": "Our home in Millbrae",
  "locationDetail": "",
  "hostLine": "",
  "note": "",
  "hostNames": "Sheila or Shah"
}
</script>

<main class="stage">
  <div class="scene" id="scene" role="button" tabindex="0" aria-label="Open the envelope">
    <div class="envelope">
      <div class="back"></div>
      <div class="side-left"></div>
      <div class="side-right"></div>
      <div class="pocket"></div>
    </div>

    <!-- the card peeks out when the flap opens -->
    <article class="card" id="card" aria-hidden="true">
      <h1 data-slot="cardTitle">Name's birthday</h1>
      <p class="sub" data-slot="subtitle">subtitle</p>
      <div class="divider-ornament" aria-hidden="true">
        <span class="line"></span>
        <span class="diamond">◆</span>
        <span class="line"></span>
      </div>
      <p class="detail"><span data-slot="when">Date · Time</span></p>
      <p class="detail"><span data-slot="location">Location</span></p>
    </article>

    <div class="flap-layer">
      <div class="flap"></div>
      <div class="seal" aria-hidden="true"><span class="monogram">S</span></div>
    </div>
    <p class="hint">Tap to open</p>
    <button class="tap-target" aria-label="Open invitation"></button>
  </div>
</main>

<section class="panel" id="panel" aria-live="polite">
  <h2 data-slot="panelHeading">The Details</h2>
  <p class="lede" data-slot="hostLine" id="hostLine"></p>
  <p class="lede" data-slot="note" id="noteLine" style="margin-top:-14px;"></p>

  <div class="grid">
    <div class="cell"><div class="label">Date</div><div class="value" data-slot="date">—</div></div>
    <div class="cell"><div class="label">Time</div><div class="value" data-slot="time">—</div></div>
    <div class="cell" style="grid-column: 1 / -1;">
      <div class="label" data-slot="locationLabel">Location</div>
      <div class="value" data-slot="location">—</div>
      <div class="value" data-slot="locationDetail" style="font-style: italic; font-weight: 300; font-size: 13px; color: var(--muted); margin-top: 4px;"></div>
    </div>
  </div>

  <div class="reply-note">
    <div class="reply-ornament" aria-hidden="true">
      <span class="line"></span>
      <span class="diamond">◆</span>
      <span class="line"></span>
    </div>
    <p class="reply-lede">Please let us know if you can make it.</p>
  </div>

  <form class="rsvp" id="rsvpForm" novalidate>
    <div>
      <label for="rsvpName">Your name<span class="req" aria-hidden="true">*</span></label>
      <input type="text" id="rsvpName" name="name" autocomplete="name" placeholder="So we know who's replying" required />
    </div>

    <div>
      <label>Will you be there?<span class="req" aria-hidden="true">*</span></label>
      <div class="attending-row">
        <button type="button" class="attend-btn" data-attending="yes">Joyfully yes</button>
        <button type="button" class="attend-btn" data-attending="no">Regretfully no</button>
      </div>
    </div>

    <div class="guest-row">
      <label for="rsvpGuests">Total in your party (including you)</label>
      <input type="number" id="rsvpGuests" name="guests" min="1" max="10" value="1" />
    </div>

    <div class="hint-line" id="rsvpHint" aria-live="polite"></div>
    <button type="submit" class="submit" id="rsvpSubmit" disabled>Send reply</button>
    <div class="error" id="rsvpError" role="alert"></div>
  </form>

  <div class="rsvp-success" id="rsvpSuccess">
    <p id="rsvpSuccessMessage"></p>
    <button type="button" class="submit" id="rsvpEdit" style="margin-top: 16px; background: transparent; color: var(--accent); border: 1px solid var(--accent);">Change my reply</button>
  </div>
</section>

<footer class="site-footer">
  Handcrafted <span class="heart">♥</span> by <span class="by">Sheila</span>, with help from <span class="by">Claude</span>
</footer>

<div class="confetti" id="confetti" aria-hidden="true"></div>

<script type="module">
  // ---------- SUPABASE CONFIG ----------
  // Paste values from Supabase → Settings → API.
  // The anon key is safe to ship in the browser — RLS protects the data.
  const SUPABASE_URL = 'https://htghkxrvvdggkztywnrk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_DcG1mc5crBGbX8jS-xVseQ_nFVMJ_6P';

  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('rsvpForm');
  const nameInput = document.getElementById('rsvpName');
  const guestsInput = document.getElementById('rsvpGuests');
  const submitBtn = document.getElementById('rsvpSubmit');
  const errorEl = document.getElementById('rsvpError');
  const successEl = document.getElementById('rsvpSuccess');
  const successMsg = document.getElementById('rsvpSuccessMessage');
  const editBtn = document.getElementById('rsvpEdit');
  const attendBtns = document.querySelectorAll('.attend-btn');
  const hintEl = document.getElementById('rsvpHint');
  const STORAGE_KEY = 'shah40-rsvp';
  let attending = null;

  const showSuccess = (reply) => {
    const name = reply.name;
    if (reply.attending) {
      const count = reply.guest_count || 1;
      const party = count === 1 ? 'just you' : `${count} guests`;
      successMsg.textContent = `${name}, we have you down as joyfully attending — ${party}. See you there!`;
    } else {
      successMsg.textContent = `${name}, we have your regrets. Thank you for letting us know — you'll be missed.`;
    }
    form.style.display = 'none';
    successEl.classList.add('visible');
  };

  const showForm = (prefill) => {
    successEl.classList.remove('visible');
    form.style.display = '';
    if (prefill) {
      nameInput.value = prefill.name || '';
      if (prefill.attending === true || prefill.attending === false) {
        attendBtns.forEach(b => b.classList.remove('selected'));
        const target = document.querySelector(`.attend-btn[data-attending="${prefill.attending ? 'yes' : 'no'}"]`);
        if (target) target.classList.add('selected');
        attending = prefill.attending;
        form.classList.toggle('is-attending', attending);
      }
      if (prefill.guest_count) guestsInput.value = prefill.guest_count;
    }
    updateSubmitState();
  };

  const updateSubmitState = () => {
    const hasName = !!nameInput.value.trim();
    const hasAttending = attending !== null;
    submitBtn.disabled = !(hasName && hasAttending);

    let msg = '';
    if (!hasName && !hasAttending) msg = 'Add your name and choose yes or no to send your reply.';
    else if (!hasName) msg = 'Add your name to send your reply.';
    else if (!hasAttending) msg = 'Choose yes or no to send your reply.';
    hintEl.textContent = msg;
  };

  const saved = (() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
  })();
  if (saved) showSuccess(saved);
  else updateSubmitState();

  editBtn.addEventListener('click', () => showForm(saved));

  attendBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      attendBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      attending = btn.dataset.attending === 'yes';
      form.classList.toggle('is-attending', attending);
      updateSubmitState();
    });
  });

  nameInput.addEventListener('input', updateSubmitState);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    const payload = {
      name: nameInput.value.trim(),
      attending,
      guest_count: attending ? Math.max(1, parseInt(guestsInput.value, 10) || 1) : 0,
    };

    const { error } = await supabase.from('rsvps').insert(payload);

    if (error) {
      errorEl.textContent = 'Something went wrong. Please try again or text the hosts.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reply';
      console.error(error);
      return;
    }

    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch {}
    submitBtn.textContent = 'Send reply';
    showSuccess(payload);
  });
</script>

<script>
  const config = JSON.parse(document.getElementById('config').textContent);

  // --- populate slots ---
  const setSlot = (key, value) => {
    document.querySelectorAll(`[data-slot="${key}"]`).forEach(el => { el.textContent = value; });
  };
  setSlot('milestone', config.milestoneWord || 'forty');
  setSlot('name', config.name);
  setSlot('cardTitle', config.cardTitle || `${config.name}'s birthday`);
  setSlot('subtitle', config.subtitle);
  setSlot('when', `${config.date} · ${config.time}`);
  setSlot('locationLabel', config.locationLabel || 'Location');
  setSlot('location', config.location);
  setSlot('locationDetail', config.locationDetail || '');
  setSlot('note', config.note || '');
  setSlot('date', config.date);
  setSlot('time', config.time);
  setSlot('hostLine', config.hostLine || '');
  setSlot('hostNames', config.hostNames || 'the hosts');
  setSlot('panelHeading', config.occasion || 'The Details');
  document.title = `${config.name}'s ${config.occasion || 'Birthday'} — You're Invited`;

  // hide empty optional lines so they don't leave gaps
  ['hostLine', 'noteLine'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el.textContent.trim()) el.style.display = 'none';
  });

  // seal initial = first letter of name
  const sealEl = document.querySelector('.seal .monogram');
  if (sealEl && config.name) sealEl.textContent = config.name.trim()[0] || '♥';

  // --- envelope open ---
  const scene = document.getElementById('scene');
  const panel = document.getElementById('panel');
  let opened = false;

  const openEnvelope = () => {
    if (opened) return;
    opened = true;
    scene.classList.add('opened');
    setTimeout(() => panel.classList.add('visible'), 2600);
    setTimeout(() => {
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 3200);
    runConfetti();
  };

  scene.addEventListener('click', openEnvelope);
  scene.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openEnvelope(); }
  });

  // --- confetti ---
  function runConfetti() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const colors = ['#b8892b', '#e4b859', '#fff5dc', '#7a5a17', '#faf6ee'];
    const host = document.getElementById('confetti');
    // fewer particles on small screens — cheaper on low-end phones
    const count = window.innerWidth < 480 ? 28 : 56;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      s.style.left = Math.random() * 100 + 'vw';
      s.style.background = colors[i % colors.length];
      s.style.animationDelay = (Math.random() * 0.6) + 's';
      s.style.animationDuration = (2.6 + Math.random() * 1.4) + 's';
      s.style.transform = `rotate(${Math.random() * 360}deg)`;
      s.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
      frag.appendChild(s);
      setTimeout(() => s.remove(), 4500);
    }
    host.appendChild(frag);
  }
</script>

</body>
